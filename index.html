<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Escape Room</title>
  <script type="module" src="https://pyscript.net/releases/2024.11.1/core.js"></script>
  <style>
    body {
      max-width: 640px;
      margin: 60px auto;
      padding: 0 24px 120px;
      font-family: system-ui, sans-serif;
      color: #1a1a1a;
      background: #fff;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }
    #output {
      font-family: monospace;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 10px;
    }
    #input-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #f8f8f8;
      padding: 20px 24px;
      display: flex;
      border-top: 1px solid #ddd;
      box-sizing: border-box;
      align-items: center;
      z-index: 1000;
    }
    #prompt-label {
      font-family: monospace;
      font-weight: bold;
      margin-right: 12px;
      color: #333;
    }
    #user-input {
      flex-grow: 1;
      border: 1px solid #ccc;
      padding: 8px;
      border-radius: 4px;
      outline: none;
      font-family: monospace;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <script id="room-list" type="application/json">
  ["aarav.py", "alyna.py", "anika.py", "kanish.py", "meghna.py", "wilfred.py"]
  </script>

  <h1>Escape Room</h1>
  <i>The input box is at the bottom!</i>
  <div id="output">Loading...</div>

  <div id="input-container">
    <span id="prompt-label">></span>
    <input type="text" id="user-input" autocomplete="off" autofocus>
  </div>

  <script type="py">
import os, json, js, builtins, asyncio, ast
from pyodide.http import pyfetch
from pyodide.ffi import create_proxy

output = js.document.getElementById("output")
user_input = js.document.getElementById("user-input")
prompt_label = js.document.getElementById("prompt-label")

input_event = asyncio.Event()
current_input_value = ""

def _print(*args, end="\n", sep=" ", **kw):
    text = sep.join(str(a) for a in args) + end
    output.textContent += text
    js.window.scrollTo(0, js.document.body.scrollHeight)

async def custom_input(prompt=""):
    global current_input_value
    prompt_label.textContent = str(prompt) if prompt else "> "
    user_input.value = ""
    user_input.focus()
    
    await input_event.wait()
    input_event.clear()
    
    _print(f"{prompt_label.textContent}{current_input_value}")
    prompt_label.textContent = "> "
    return current_input_value

def handle_keypress(event):
    global current_input_value
    if event.key == "Enter":
        current_input_value = user_input.value
        input_event.set()

keypress_proxy = create_proxy(handle_keypress)
user_input.addEventListener("keydown", keypress_proxy)

builtins.print = _print
builtins.input = custom_input

# --- THE FIX: Pure Python AST Code Runner ---
def run_room_async(code_str, namespace):
    # 1. Parse original room code natively
    room_tree = ast.parse(code_str)

    # 2. Safely transform standard input() into await input()
    class AwaitInputTransformer(ast.NodeTransformer):
        def visit_Call(self, node):
            self.generic_visit(node)
            if isinstance(node.func, ast.Name) and node.func.id == 'input':
                return ast.Await(value=node)
            return node
            
    room_tree = AwaitInputTransformer().visit(room_tree)

    # 3. Inject 'global escaped' so the main loop can read the variable
    global_decl = ast.parse("global escaped").body[0]
    room_tree.body.insert(0, global_decl)

    # 4. Wrap it in an async function structure
    wrapper_tree = ast.parse("async def _runner():\n    pass")
    wrapper_tree.body[0].body = room_tree.body # Replace 'pass' with the room logic

    # 5. Compile and execute
    ast.fix_missing_locations(wrapper_tree)
    compiled = compile(wrapper_tree, filename="<room>", mode="exec")
    
    # Executing defines '_runner' inside our namespace
    exec(compiled, namespace)
    
    # Return the coroutine
    return namespace['_runner']()
# ---------------------------------------------

async def main():
    output.textContent = ""
    os.makedirs("rooms", exist_ok=True)
    
    try:
        room_list_json = js.document.getElementById("room-list").textContent
        room_names = json.loads(room_list_json)
    except:
        print("Error: Could not parse room list.")
        return

    # Fetch files
    for filename in room_names:
        try:
            resp = await pyfetch(f"rooms/{filename}")
            if resp.status == 200:
                content = await resp.string()
                with open(f"rooms/{filename}", "w") as f:
                    f.write(content)
        except:
            pass

    room_files = [f for f in os.listdir("rooms") if f.endswith(".py")]
    if not room_files:
        print("No rooms found in the /rooms folder. Check your python -m http.server")
        return

    print("Choose an option: ")
    print("[1] Attempt to Escape From All")
    print("[2] Try a Specific Room")
    
    choice = (await custom_input("Select (1/2): ")).strip()
    
    active_rooms = room_files
    if choice == "2":
        print("Enter a room name to try.")
        print(f"Available: {', '.join(room_files)}")
        target = (await custom_input("Enter filename: ")).strip()
        if target in room_files:
            active_rooms = [target]
        else:
            print("Invalid room. Restarting...")
            return

    for i, filename in enumerate(active_rooms):
        print(f"\n--- [Room {i+1}: {filename}] ---")
        
        with open(f"rooms/{filename}", "r") as f:
            code = f.read()

        namespace = {
            "escaped": False,
            "print": _print,
            "input": custom_input,
            "__name__": "__main__"
        }

        try:
            # Execute the AST-generated coroutine
            coro = run_room_async(code, namespace)
            await coro
        except SystemExit:
            print()
        except Exception as e:
            print(f"\n[ERROR in {filename}]: {e}")
            continue

        if not namespace.get("escaped"):
            print("\n==================================================")
            print("                   GAME OVER")
            print("==================================================")
            break
    else:
        print("\n" + "_"*50 + "\n          YOU ESCAPED ALL ROOMS!!")

asyncio.ensure_future(main())
  </script>
</body>
</html>
